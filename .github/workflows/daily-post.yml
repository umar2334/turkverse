name: Daily Post Publisher

on:
  schedule:
    # 11 PM PKT = 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch: # manual trigger for testing

jobs:
  publish-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate new post
        run: node scripts/generate-post.mjs

      - name: Commit and push
        run: |
          git config user.name "TurkVerse Bot"
          git config user.email "bot@turkdrama.live"
          git add data/posts.json
          git diff --staged --quiet || git commit -m "Daily post: $(date +'%B %d, %Y')"
          git push

      - name: Seed to Redis
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          curl -f "https://www.turkdrama.live/api/seed?secret=$ADMIN_PASSWORD"
          echo ""
          echo "Posts seeded to Redis"
